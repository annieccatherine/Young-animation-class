<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Responsive Cards</title>
  <link rel="stylesheet" href="styles.css" />
</head>

<body>
    <main class="center">
      <div class="cards-grid" aria-label="Card-grid">
        <div class="card card-1" role="group" aria-label="Card 1" tabindex="0">
        <img
          src="graphics2.jpeg"
          alt="graphics" />
          <div class="card-content">
            <h3>GRAPHICS</h3>
            <p>SHOP NOW</p>
            <p>></p>
        </div>
    </div>

<div class="card card-2" role="group" aria-label="Card 2" tabindex="0">
    <img src="shirt.jpeg"
        alt="merch"/>
        <div class="card-content">
            <h3>APPAREL</h3>
            <p>SHOP NOW</p>
            <p>></p>
        </div>
    </div>

<div class="card card-3" role="group" aria-label="Card 3" tabindex="0">
    <img
        src="fredric.jpeg"
            alt="branding" />
            <div class="card-content">
        <h3>BRANDING</h3>
        <p>SHOP NOW</p>
        <p>></p>
    </div>
</div>

</div>
</main>
</body>
</html>
