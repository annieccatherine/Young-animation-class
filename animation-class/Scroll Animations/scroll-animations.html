<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Scroll Animations</title>
  <link rel="stylesheet" href="scroll.css" />
</head>
<body>
<div class="scroll-watcher"></div>

<main class="story-layout">
    <aside class="left-panel"> 
      <div class="left-inner">
        <p class="eyebrow">ARTIST COLLECTIVE.</p>
        <p class="changing-text">
        <p class="sub-text">
    <span id="rolling-word" class="rolling-word">GRAPHICS</span>
    </p>
</p>
</div>
</aside>

</div>
</div>

<section class="right-panel">
  <div class="scroll-step" data-word="GRAPHICS">
    <div class="image-card">
      <img src="graphics.gif"
      alt="graphics" />
    </div>
</div>

    <div class="scroll-step" data-word="APPAREL">
    <div class="image-card">
      <img src="merch.gif"
      alt="MERCH"
      />
    </div>
</div>

    <div class="scroll-step" data-word="BRANDING">
    <div class="image-card">
      <img src="branding.gif"
      alt="BRANDING"
      />
    </div>
  </div>
</section>

</main>

<script src="app.js"></script>
</body>
</html>
